<!DOCTYPE html>
<html>
<head><title>STACKO Icon Generator</title></head>
<body style="background:#222; padding:20px; font-family:sans-serif; color:#fff;">
<h2>STACKO Icon Generator</h2>
<p>Right-click each icon and "Save Image As" to download.</p>
<div id="icons" style="display:flex; flex-wrap:wrap; gap:20px;"></div>
<script>
const sizes = [1024, 512, 192, 180, 167, 152, 120, 76, 60, 40, 29, 20];

const COLORS = [
  { bg: '#6c5ce7', top: '#8b7cf0' },  // S
  { bg: '#0984e3', top: '#2d9af0' },  // T
  { bg: '#00b894', top: '#1dd1a1' },  // A
  { bg: '#f0c674', top: '#f5d98a' },  // C
  { bg: '#e17055', top: '#f08a70' },  // K
  { bg: '#e84393', top: '#f06aaa' },  // O
];

function drawIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const s = size / 1024; // scale factor

  // Background - dark gradient
  const grad = ctx.createLinearGradient(0, 0, 0, size);
  grad.addColorStop(0, '#0c0c18');
  grad.addColorStop(1, '#06060c');
  ctx.fillStyle = grad;

  // Rounded rect background
  const r = 180 * s;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // Subtle bokeh circles
  ctx.globalAlpha = 0.04;
  [[300, 250, 120, '#6c5ce7'], [700, 600, 90, '#f0c674'], [200, 700, 80, '#e84393']].forEach(([x,y,rad,col]) => {
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(x*s, y*s, rad*s, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Draw stacked blocks with "S" visible
  const letters = ['S','T','A','C','K','O'];
  const blockW = 110 * s;
  const blockH = 90 * s;
  const startY = 520 * s;
  const centerX = size / 2;

  // Only show 3 blocks stacked (bottom portion of tower) + "S" on top
  const visibleBlocks = [
    { letter: 'K', ci: 4, x: centerX - blockW/2, y: startY + blockH * 2 + 8*s },
    { letter: 'C', ci: 3, x: centerX - blockW/2 - 10*s, y: startY + blockH + 4*s },
    { letter: 'A', ci: 2, x: centerX - blockW/2 + 5*s, y: startY },
  ];

  visibleBlocks.forEach(b => {
    const c = COLORS[b.ci];
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    roundRect(ctx, b.x + 4*s, b.y + 5*s, blockW, blockH, 14*s);
    // Body
    ctx.fillStyle = c.bg;
    roundRect(ctx, b.x, b.y, blockW, blockH, 14*s);
    // Top bevel
    ctx.fillStyle = c.top;
    roundRectTop(ctx, b.x, b.y, blockW, blockH * 0.42, 14*s);
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    roundRect(ctx, b.x + 10*s, b.y + 5*s, blockW * 0.45, 7*s, 3*s);
  });

  // Big "STACKO" text at top
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.font = `bold ${220*s}px "Arial Black", Impact, sans-serif`;
  ctx.fillText('S', centerX + 3*s, 260*s + 3*s);

  // Main letter
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${220*s}px "Arial Black", Impact, sans-serif`;
  ctx.fillText('S', centerX, 260*s);

  // Glow
  ctx.shadowColor = '#6c5ce7';
  ctx.shadowBlur = 30 * s;
  ctx.fillText('S', centerX, 260*s);
  ctx.shadowBlur = 0;

  // Small "TACKO" below the S
  ctx.font = `bold ${56*s}px "Arial Black", Impact, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.letterSpacing = `${8*s}px`;
  ctx.fillText('TACKO', centerX, 400*s);

  return canvas;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
  ctx.fill();
}

function roundRectTop(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h);
  ctx.lineTo(x, y+h);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
  ctx.fill();
}

const container = document.getElementById('icons');
sizes.forEach(size => {
  const canvas = drawIcon(size);
  const div = document.createElement('div');
  div.style.textAlign = 'center';
  div.innerHTML = `<div style="margin-bottom:4px;font-size:12px;">${size}×${size}</div>`;
  canvas.style.width = Math.min(size, 200) + 'px';
  canvas.style.height = Math.min(size, 200) + 'px';
  canvas.style.borderRadius = '16px';
  div.appendChild(canvas);

  // Download link
  const link = document.createElement('a');
  link.download = `stacko-icon-${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.textContent = 'Download';
  link.style.color = '#6c5ce7';
  link.style.fontSize = '11px';
  div.appendChild(document.createElement('br'));
  div.appendChild(link);

  container.appendChild(div);
});
</script>
</body>
</html>
